name: Build Index

on:
  push:
    branches:
      - main
    paths:
      - "blueprints/**"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build-index:
    name: Validate & Build Index
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate blueprints
        run: node scripts/validate-blueprints.js

      - name: Build index.json
        run: node scripts/build-index.js

      - name: Commit updated index.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate index.json [skip ci]"
          file_pattern: index.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
